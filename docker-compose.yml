version: "3.9"

services:
  backend:
    build: ./backend
    container_name: compliancegpt_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app          # hot-reload: code changes reflect instantly
    env_file:
      - .env
    networks:
      - compliancenet

  frontend:
    build: ./frontend
    container_name: compliancegpt_frontend
    ports:
      - "8501:8501"
    volumes:
      - ./frontend:/app         # hot-reload: code changes reflect instantly
    environment:
      - BACKEND_URL=http://backend:8000   # frontend talks to backend by service name
    depends_on:
      - backend
    networks:
      - compliancenet

networks:
  compliancenet:
    driver: bridge
